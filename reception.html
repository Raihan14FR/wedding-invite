<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Receptionist - Pernikahan Lisa & Raihan</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #F5EDE0;
            font-family: 'Jost', 'Segoe UI', sans-serif;
            padding: 20px;
            color: #2C2018;
        }
        .container { max-width: 600px; margin: 0 auto; }
        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            text-align: center;
            margin-bottom: 1rem;
            color: #7A9B76;
        }
        .panel {
            background: white;
            border-radius: 32px;
            padding: 1.5rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            margin-bottom: 1.5rem;
        }
        .qr-scanner { text-align: center; }
        #qr-reader { width: 100%; max-width: 400px; margin: 0 auto; }
        video {
            width: 100%;
            max-width: 400px;
            border-radius: 24px;
            margin: 1rem 0;
            border: 2px solid #C6A43F;
        }
        .manual-input {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }
        .manual-input input {
            flex: 2;
            padding: 12px;
            border-radius: 60px;
            border: 1px solid #ddd;
            font-size: 1.2rem;
            text-align: center;
            letter-spacing: 2px;
        }
        button {
            background: #7A9B76;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover {
            background: #C6A43F;
            color: #2C2018;
        }
        .status {
            margin-top: 1rem;
            padding: 0.8rem;
            border-radius: 60px;
            text-align: center;
            font-weight: 500;
        }
        .success { background: rgba(122,155,118,0.2); color: #7A9B76; }
        .error { background: rgba(201,144,140,0.2); color: #C9908C; }
        .info {
            font-size: 0.8rem;
            color: #8B6E5C;
            text-align: center;
            margin-top: 1rem;
        }
        hr { margin: 1rem 0; border: none; border-top: 1px solid #e0d9cf; }
        .label { font-weight: 500; margin-bottom: 0.5rem; display: block; }
        .sync-status {
            background: #e8e0d5;
            border-radius: 28px;
            padding: 0.5rem;
            text-align: center;
            font-size: 0.8rem;
            margin-bottom: 1rem;
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Receptionist</h1>
        <div class="sync-status" id="syncStatus">⏳ Menunggu data dari admin...</div>
        <div class="panel qr-scanner">
            <div class="label">Scan QR Code Tamu</div>
            <div id="qr-reader"></div>
            <div id="scan-status" class="status hidden"></div>
        </div>
        <hr>
        <div class="panel">
            <div class="label">Atau Masukkan Kode Unik (6 karakter)</div>
            <div class="manual-input">
                <input type="text" id="manualCode" maxlength="6" placeholder="Contoh: A1B2C3" autocomplete="off">
                <button id="submitManual">Verifikasi</button>
            </div>
            <div id="manual-status" class="status hidden"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
    apiKey: "AIzaSyCDjGcWD3PZbr8UAYSGFgiyLFNH-7uuVx0",
    authDomain: "undangan-6f675.firebaseapp.com",
    databaseURL: "https://undangan-6f675-default-rtdb.firebaseio.com",
    projectId: "undangan-6f675",
    storageBucket: "undangan-6f675.firebasestorage.app",
    messagingSenderId: "852724173933",
    appId: "1:852724173933:web:e727d4b232a5632d588364",
    measurementId: "G-SES81QSV4T"
};
firebase.initializeApp(firebaseConfig);
const database = firebase.database();
const guestDataRef = database.ref('guest_data');
const checkinsRef = database.ref('checkins');
        
        let tamuData = [];
        let html5QrCode = null;
        let scannerStarted = false;
        
        guestDataRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && Array.isArray(data)) {
                tamuData = data;
                document.getElementById('syncStatus').innerHTML = `✅ Data tamu tersinkron (${tamuData.length} tamu)`;
                document.getElementById('syncStatus').style.background = '#d4e2d0';
            } else {
                tamuData = [];
                document.getElementById('syncStatus').innerHTML = `⚠️ Belum ada data. Admin harus menekan tombol "Sinkronkan Data Tamu ke Firebase" di halaman undangan.`;
                document.getElementById('syncStatus').style.background = '#f0d5cf';
            }
        });
        
        function showStatus(msg, type, panel) {
            const statusDiv = panel === 'scan' ? document.getElementById('scan-status') : document.getElementById('manual-status');
            statusDiv.textContent = msg;
            statusDiv.className = `status ${type}`;
            statusDiv.classList.remove('hidden');
            setTimeout(() => statusDiv.classList.add('hidden'), 3000);
        }
        
        async function processCheckin(code) {
            if (tamuData.length === 0) {
                showStatus('Data tamu belum tersedia. Minta admin untuk sinkronkan data.', 'error', 'scan');
                return false;
            }
            const guest = tamuData.find(g => g.code === code.toUpperCase());
            if (!guest) {
                showStatus('Kode tidak ditemukan.', 'error', 'scan');
                return false;
            }
            const snapshot = await checkinsRef.orderByChild('code').equalTo(code).once('value');
            if (snapshot.exists()) {
                showStatus(`Tamu ${guest.name} sudah check-in sebelumnya`, 'error', 'scan');
                return false;
            }
            await checkinsRef.push({
                name: guest.name,
                code: guest.code,
                time: new Date().toISOString(),
                attendance: guest.attendance
            });
            showStatus(`Selamat datang, ${guest.name}!`, 'success', 'scan');
            return true;
        }
        
        function startScanner() {
            if (html5QrCode === null) {
                html5QrCode = new Html5Qrcode("qr-reader");
            }
            if (!scannerStarted) {
                const config = { fps: 10, qrbox: { width: 250, height: 250 } };
                html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
                    processCheckin(decodedText);
                }, (err) => {}).then(() => {
                    scannerStarted = true;
                }).catch(err => {
                    showStatus("Tidak dapat mengakses kamera. Pastikan izin diberikan.", "error", "scan");
                });
            }
        }
        
        document.getElementById('submitManual').addEventListener('click', () => {
            const code = document.getElementById('manualCode').value.trim();
            if (code.length !== 6) {
                showStatus('Masukkan 6 karakter kode unik', 'error', 'manual');
                return;
            }
            processCheckin(code);
            document.getElementById('manualCode').value = '';
        });
        
        startScanner();
    </script>
</body>
</html>
